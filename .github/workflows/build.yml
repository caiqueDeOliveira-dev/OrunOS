name: Build installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: orun_project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - run: npx electron-builder install-app-deps
      - run: npm run build
      - run: npx electron-builder --win --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            orun_project/release/*.exe
            orun_project/release/*.yml
            orun_project/release/*.yaml
            orun_project/release/*.blockmap
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: orun_project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - run: npx electron-builder install-app-deps
      - run: npm run build
      - run: npx electron-builder --mac --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ""
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: macos-installer
          path: |
            orun_project/release/*.dmg
            orun_project/release/*.zip
          if-no-files-found: ignore

  build-linux:
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: orun_project
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci --ignore-scripts
      - run: npx electron-builder install-app-deps
      - run: npm run build
      - run: npx electron-builder --linux --publish never
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: linux-installer
          path: |
            orun_project/release/*.AppImage
            orun_project/release/*.deb
            orun_project/release/*.tar.gz
          if-no-files-found: ignore

  publish:
    needs: [build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: find artifacts -type f 2>/dev/null || echo "No artifacts found"

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
            artifacts/**/*.yml
            artifacts/**/*.yaml
            artifacts/**/*.blockmap
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
